<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Analyzer | Premium Data Viz</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Modules -->
    <script type="module" src="modules/main.js"></script>
</head>
<body>

    <!-- Drag & Drop Overlay -->
    <div id="upload-overlay" class="hidden">
        <div class="upload-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <h2>Drop CSV files here</h2>
            <p>ComDet Fiji plugin outputs supported</p>
        </div>
    </div>

    <!-- App Container -->
    <div class="app-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="title-actions">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <h1>DataViz</h1>
                        <span class="badge">PRO</span>
                    </div>
                    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Light/Dark Mode">
                        ☀️
                    </button>
                </div>
            </div>

            <div class="controls-section">
                <h3>Project</h3>
                <div style="display: flex; gap: 8px;">
                    <button id="save-project-btn" class="secondary-btn" style="flex: 1;">Save</button>
                    <button id="load-project-btn" class="secondary-btn" style="flex: 1;">Load</button>
                </div>
            </div>

            <div class="controls-section">
                <div class="section-header">
                    <h3>Saved Comparisons</h3>
                </div>
                <div id="saved-comparisons-list">
                    <div class="empty-state small">No saved comparisons</div>
                </div>
            </div>

            <div class="controls-section">
                <h3>View Mode</h3>
                <div class="toggle-group" id="view-mode-toggle">
                    <button class="toggle-btn active" data-value="image">Image</button>
                    <button class="toggle-btn" data-value="well">Well</button>
                    <button class="toggle-btn" data-value="parameter">Param</button>
                </div>
            </div>

            <div class="controls-section" id="aggregation-controls" style="display: none;">
                <h3>Aggregation</h3>
                <div class="toggle-group" id="agg-mode-toggle">
                    <button class="toggle-btn active" data-value="all">All Points</button>
                    <button class="toggle-btn" data-value="mean">Mean</button>
                    <button class="toggle-btn" data-value="median">Median</button>
                </div>
            </div>

            <!-- Thresholds -->
            <div class="controls-section" id="threshold-section" style="display: none;">
                <h3>Thresholds</h3>
                <div id="threshold-controls"></div>
            </div>

            <!-- Graph Type -->
            <div class="controls-section">
                <h3>Graph Type</h3>
                <div class="toggle-group" id="graph-type-toggle">
                    <button class="toggle-btn active" data-value="scatter">Scatter</button>
                    <button class="toggle-btn" data-value="histogram">Hist</button>
                    <button class="toggle-btn" data-value="box">Box</button>
                    <button class="toggle-btn" data-value="bar">Bar</button>
                </div>
                
                <div id="metric-select-container" style="margin-top: 10px; display: none;">
                    <div class="label-small">Metric</div>
                    <select id="graph-metric-select" class="select-input">
                        <option value="int">Integrated Int</option>
                        <option value="area">Area (NArea)</option>
                        <option value="density">Density (Int/Area)</option>
                        <option value="count">Count (n)</option>
                    </select>
                </div>
            </div>

            <div class="controls-section list-section">
                <div class="section-header">
                    <h3>Datasets</h3>
                    <div class="list-actions">
                        <button id="toggle-all-btn" class="text-btn">Toggle</button>
                        <button id="select-all-btn" class="text-btn">All</button>
                        <button id="delete-btn" class="text-btn danger">Delete</button>
                    </div>
                </div>
                
                <div style="margin-bottom: 10px; display: flex; gap: 5px;">
                    <button id="compare-mode-btn" class="secondary-btn small" style="flex:1">Enable Comparison</button>
                    <button id="save-comparison-btn" class="secondary-btn small" style="flex:1" disabled>Save Comp.</button>
                </div>
                <div id="dataset-list" class="scrollable-list">
                    <!-- List items injected here -->
                    <div class="empty-state">No files loaded</div>
                </div>
            </div>

            <div class="action-area">
                <label for="file-input" class="primary-btn">
                    Upload CSVs
                    <input type="file" id="file-input" multiple accept=".csv" hidden>
                </label>
            </div>
        </aside>

        <!-- Resize Handle -->
        <div id="sidebar-resizer" class="resizer"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumbs">
                    <span id="current-view-label">Analysis View</span>
                </div>
                <div class="top-actions">
                    <!-- Moved to sidebar -->
                </div>
            </header>

            <div class="chart-area" id="chart-container">
                <div class="placeholder-chart">
                    <p>Select a dataset to visualize</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
