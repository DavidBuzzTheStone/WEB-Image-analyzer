<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
    <div id="chart-container" style="width: 800px; height: 600px;"></div>
    <script>
        const traces = [
            {
                y: [1, 2, 2, 3, 3, 3, 4, 4, 5],
                type: 'violin',
                name: 'Group 1',
                box: { visible: true },
                meanline: { visible: true },
                points: 'outliers',
                jitter: 0.3,
                marker: { color: 'red', size: 4 },
                line: { color: 'red' },
                fillcolor: 'red',
                opacity: 0.75,
            },
            {
                y: [2, 3, 3, 4, 4, 4, 5, 5, 6],
                type: 'violin',
                name: 'Group 2',
                box: { visible: true },
                meanline: { visible: true },
                points: 'outliers',
                jitter: 0.3,
                marker: { color: 'blue', size: 4 },
                line: { color: 'blue' },
                fillcolor: 'blue',
                opacity: 0.75,
            }
        ];
        const layout = {
            title: 'Violin Plot Test',
            violinmode: 'group'
        };
        Plotly.newPlot('chart-container', traces, layout).catch(err => {
            console.error("PLOTLY ERROR: ", err);
            document.body.innerHTML += "<h1 style='color:red'>" + err + "</h1>";
        });
    </script>
</body>
</html>
